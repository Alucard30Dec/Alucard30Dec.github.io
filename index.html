<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hoang Van Thien - Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ["Inter", "sans-serif"] }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="antialiased">
  <header class="fixed top-0 left-0 right-0 bg-white/80 backdrop-blur-sm z-50 shadow-sm border-b border-gray-200">
    <nav class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
      <a href="#home" class="text-xl font-bold text-gray-900" id="siteBrand">Hoang Van Thien</a>
      <div class="hidden md:flex items-center space-x-6" id="desktopNavLinks"></div>
      <div class="md:hidden">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
        </svg>
      </div>
    </nav>
  </header>

  <main class="max-w-6xl mx-auto px-6 pt-24 md:pt-32">
    <section id="home" class="min-h-[60vh] flex items-center py-16">
      <div class="w-full grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
        <div class="order-1 md:order-2 flex justify-center">
          <img
            id="heroAvatar"
            src="Images/ProfileImage.png"
            alt="Hoang Van Thien"
            class="rounded-full shadow-xl w-60 h-60 md:w-80 md:h-80 object-cover border-4 border-white"
            onerror="this.src='https://placehold.co/300x300/E0E0E0/333?text=HVT'; this.onerror=null;"
          />
        </div>

        <div class="order-2 md:order-1 text-center md:text-left">
          <span class="text-lg font-medium text-gray-600" id="heroIntro">I am</span>
          <h1 class="text-5xl md:text-6xl font-bold text-gray-900 mt-1 mb-4" id="heroName">Hoang Van Thien</h1>
          <h2 class="text-2xl font-medium text-gray-700" id="heroRole">Software Engineering Student</h2>
          <p class="mt-3 text-lg text-gray-600" id="heroTagline"></p>
          <div class="mt-8 flex flex-wrap justify-center md:justify-start gap-4" id="heroActions"></div>
          <div class="mt-8 flex justify-center md:justify-start space-x-5" id="heroSocials"></div>
        </div>
      </div>
    </section>

    <section id="about" class="py-24">
      <div class="text-center mb-12">
        <span class="text-sm font-medium text-gray-500" id="aboutKicker"></span>
        <h2 class="text-4xl font-bold mt-1" id="aboutTitle"></h2>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-10 items-start">
        <div class="flex justify-center">
          <img
            id="aboutImage"
            src="https://placehold.co/450x300/E0E0E0/333?text=Profile+Image"
            alt="Profile Image"
            class="rounded-2xl shadow-lg object-cover w-full h-auto"
            onerror="this.src='https://placehold.co/450x300/E0E0E0/333?text=Profile+Image'; this.onerror=null;"
          />
        </div>

        <div>
          <div class="bg-white p-8 rounded-2xl card-border mb-6">
            <div class="flex items-center space-x-4">
              <div class="bg-gray-100 p-3 rounded-full">
                <svg class="w-6 h-6 text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z"></path>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0112 21.052a11.952 11.952 0 01-6.824-4.001 12.083 12.083 0 01-.665-6.479L12 14z"></path>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14v7"></path>
                </svg>
              </div>
              <div>
                <h3 class="text-xl font-semibold" id="aboutEducationTitle"></h3>
                <p class="text-gray-600" id="aboutEducationSchool"></p>
                <p class="text-gray-600" id="aboutEducationDegree"></p>
              </div>
            </div>
          </div>

          <div class="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-4 text-left" id="aboutHighlights"></div>
          <div id="aboutParagraphs" class="mt-6"></div>
        </div>
      </div>
    </section>

    <section id="skills" class="px-4 sm:px-5 md:px-6 lg:px-7 py-8 md:py-9 bg-white rounded-[1.35rem] my-6 md:my-8 card-border">
      <div class="text-center mb-4 md:mb-5">
        <span class="text-sm font-medium text-gray-500" id="skillsKicker"></span>
        <h2 class="text-4xl font-bold mt-1" id="skillsTitle"></h2>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 2xl:grid-cols-4 gap-3" id="skillsGroups"></div>
    </section>

    <section id="achievements" class="py-24">
      <div class="text-center mb-10">
        <span class="text-sm font-medium text-gray-500" id="achievementsKicker"></span>
        <h2 class="text-4xl font-bold mt-1" id="achievementsTitle"></h2>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8" id="achievementGroups"></div>
    </section>

    <section id="projects" class="py-24">
      <div class="text-center mb-12">
        <span class="text-sm font-medium text-gray-500" id="projectsKicker"></span>
        <h2 class="text-5xl font-extrabold tracking-tight mt-1" id="projectsTitle"></h2>
        <p class="mt-3 text-gray-600 max-w-2xl mx-auto" id="projectsDescription"></p>
      </div>

      <div class="relative max-w-6xl mx-auto carousel-3d overflow-visible">
        <button id="projPrev" class="nav-arrow absolute -left-8 md:-left-16 top-1/2 -translate-y-1/2" aria-label="Previous project">
          <svg viewBox="0 0 24 24" class="w-7 h-7"><path fill="currentColor" d="M15.41 7.41 14 6l-6 6 6 6 1.41-1.41L10.83 12z"></path></svg>
        </button>
        <button id="projNext" class="nav-arrow absolute -right-8 md:-right-16 top-1/2 -translate-y-1/2" aria-label="Next project">
          <svg viewBox="0 0 24 24" class="w-7 h-7"><path fill="currentColor" d="m8.59 16.59 1.41 1.41L16 12 10 6 8.59 7.41 13.17 12z"></path></svg>
        </button>
        <div id="projTrack" class="flex items-stretch justify-center gap-2 px-2 md:px-4 will-change-transform will-change-opacity"></div>
      </div>

      <div id="projDetail" class="max-w-6xl mx-auto mt-10 bg-white rounded-3xl border border-gray-200 shadow-sm p-8 md:p-12 text-center transition-all duration-300"></div>
    </section>

    <section id="contact" class="py-24 text-center">
      <h2 class="text-5xl font-extrabold tracking-tight mt-1 mb-6" id="contactTitle"></h2>
      <p class="text-gray-600 max-w-xl mx-auto mb-10" id="contactDescription"></p>
      <div class="flex flex-col sm:flex-row flex-wrap justify-center items-center gap-4" id="contactMethods"></div>
    </section>
  </main>

  <footer class="border-t border-gray-200 mt-16">
    <div class="max-w-6xl mx-auto px-6 py-12 text-center">
      <div class="flex justify-center space-x-6 mb-6 md:hidden flex-wrap" id="footerNavLinks"></div>
      <p class="text-gray-500 text-sm" id="footerCopyright"></p>
      <p class="text-gray-400 text-xs mt-2">
        <span id="footerPortfolioLabel"></span>
        <a href="https://alucard30dec.github.io/" target="_blank" rel="noopener noreferrer" class="underline hover:text-gray-600" id="footerPortfolioLink">
          alucard30dec.github.io
        </a>
      </p>
    </div>
  </footer>

  <script src="portfolio-data.js" defer></script>
  <script src="script.js" defer></script>
</body>
</html>

services:
  caddy:
    image: caddy:2
    container_name: osms-caddy
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_AGREE: "true"
      EMAIL: ${LETSENCRYPT_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: osms-sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-14333}:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: osms-web
    depends_on:
      - sqlserver
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=OnlineSalesManagementSystemDb;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True;Encrypt=False;
      Startup__DbInitMaxRetries: 20
      Startup__DbInitDelaySeconds: 6
      Seed__ResetDemoData: "false"

volumes:
  caddy-data:
  caddy-config:
  sqlserver-data:
